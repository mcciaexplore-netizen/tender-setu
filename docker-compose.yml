version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tendersetu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tendersetu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tendersetu_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tendersetu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tendersetu} -d ${POSTGRES_DB:-tendersetu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tendersetu_network

  # Uncomment for local pgAdmin UI
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: tendersetu_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@tendersetu.in
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - tendersetu_network

volumes:
  postgres_data:
    driver: local

networks:
  tendersetu_network:
    driver: bridge
